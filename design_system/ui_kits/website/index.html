<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold-hover: #b08c30;
    --gold-light: #f8f0d8;
    --charcoal: #3a3530;
    --charcoal-dark: #2a2420;
    --charcoal-deep: #1e1a17;
    --sand: #c8b89a;
    --sand-light: #f5f0e8;
    --sand-mid: #ede4d6;
    --muted: #7a6e68;
    --border: #ddd0be;
    --white: #ffffff;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Montserrat', Arial, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--sand-light); color: var(--charcoal); -webkit-font-smoothing: antialiased; }
  img { display: block; width: 100%; object-fit: cover; }
  a { text-decoration: none; color: inherit; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--charcoal); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── SHARED TOKENS ─────────────────────────────── */
const T = {
  gold: '#c9a84c',
  goldHover: '#b08c30',
  goldLight: '#f8f0d8',
  charcoal: '#3a3530',
  charcoalDark: '#2a2420',
  charcoalDeep: '#1e1a17',
  sand: '#c8b89a',
  sandLight: '#f5f0e8',
  sandMid: '#ede4d6',
  muted: '#7a6e68',
  border: '#ddd0be',
  white: '#ffffff',
};

/* ── NAV ───────────────────────────────────────── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = ['Overview', 'Features', 'Amenities', 'Location', 'Gallery', 'Contact'];

  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
    transition: 'background 300ms, box-shadow 300ms',
    background: scrolled ? T.white : 'transparent',
    boxShadow: scrolled ? '0 2px 20px rgba(42,36,32,0.10)' : 'none',
  };

  const logoColor = scrolled ? T.charcoalDark : T.white;
  const linkColor = scrolled ? T.muted : 'rgba(255,255,255,0.82)';
  const linkActiveColor = T.gold;

  return (
    <nav style={navStyle}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: 72, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        {/* Logo */}
        <div style={{ cursor: 'pointer' }} onClick={() => window.scrollTo({ top: 0 })}>
          <div style={{ fontFamily: 'var(--font-body)', fontSize: 9, fontWeight: 700, letterSpacing: '0.22em', textTransform: 'uppercase', color: T.gold, marginBottom: 2 }}>ROYAL</div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: logoColor, lineHeight: 1 }}>Millennium</div>
        </div>
        {/* Desktop links */}
        <ul style={{ display: 'flex', gap: 28, listStyle: 'none', alignItems: 'center' }}>
          {links.map(l => (
            <li key={l}>
              <a href={`#${l.toLowerCase()}`}
                style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: linkColor, transition: 'color 200ms', padding: '4px 0', borderBottom: `2px solid transparent` }}
                onMouseEnter={e => e.target.style.color = linkActiveColor}
                onMouseLeave={e => e.target.style.color = linkColor}
              >{l}</a>
            </li>
          ))}
        </ul>
        <button
          onClick={() => document.getElementById('contact').scrollIntoView({ block: 'start' })}
          style={{ padding: '10px 22px', background: T.gold, color: T.charcoalDeep, border: 'none', borderRadius: 6, fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', transition: 'background 200ms' }}
          onMouseEnter={e => e.target.style.background = T.goldHover}
          onMouseLeave={e => e.target.style.background = T.gold}
        >Enquire Now</button>
      </div>
    </nav>
  );
}

      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(22,18,14,0.95) 0%, rgba(22,18,14,0.55) 50%, rgba(22,18,14,0.1) 100%)' }}></div>

          <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap' }}>
            <button

              Book a Site Visit

            <button
              onClick={() => document.getElementById('features').scrollIntoView({ block: 'start' })}
              style={{ padding: '15px 34px', background: 'transparent', color: T.white, border: '1.5px solid rgba(255,255,255,0.35)', borderRadius: 8, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer' }}>
              Explore Project
            </button>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 28, fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Airport Road, Gateway of Kandla Airport · Opposite Lake City, Gandhidham
          </div>
        </div>
      </div>
      {/* Stats strip */}
      <div style={{ position: 'absolute', bottom: 0, right: 0, display: 'flex', background: 'rgba(201,168,76,0.92)', borderTopLeftRadius: 12 }}>
        {[
          { num: '300ft', label: 'Arcade Front' },
          { num: '25K+', label: 'Sqft Parking' },
          { num: '4K+', label: 'Outdoor Seating' },
          { num: 'G+2', label: 'Floors' },
        ].map((s, i) => (
          <div key={i} style={{ padding: '18px 28px', borderLeft: i > 0 ? '1px solid rgba(30,26,23,0.18)' : 'none', textAlign: 'center' }}>

    </section>
  );
}

  return (

            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.gold, marginBottom: 12 }}>Key Features of Millennium</div>

        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 2 }}>

/* ── SPACES ─────────────────────────────────────── */
function Spaces() {
  const spaces = [

    { type: 'Work Units', desc: 'Compact, affordable units for start-ups, entrepreneurs, coaching centres and freelancers.', price: 'Affordable', size: 'Compact' },
  ];

  return (

      <div style={{ maxWidth: 1200, margin: '0 auto' }}>

          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.gold, marginBottom: 12 }}>What We Offer</div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 4vw, 44px)', fontWeight: 700, color: T.charcoal }}>Space for Every Vision</h2>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 20 }}>
          {spaces.map((s, i) => (

              onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 4px 20px rgba(42,36,32,0.08)'; }}

              <div style={{ height: 6, background: T.gold }}></div>

                <p style={{ fontSize: 13, color: T.muted, lineHeight: 1.6, marginBottom: 20 }}>{s.desc}</p>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.muted }}>Starting From</div>

                </div>
              </div>
            </div>
          ))}

      </div>
