<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display Type — Royal Millennium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #3a3530; padding: 28px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #c9a84c; margin-bottom: 6px; }
  .divider { height: 1px; background: #4a3f38; margin: 16px 0; }
  .display-1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #ffffff;
    line-height: 1.05;
  }
  .display-2 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.15;
  }
  .display-3 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: #c9a84c;
    line-height: 1.25;
  }
  .meta { font-size: 10px; font-family: monospace; color: #7a6e68; margin-top: 4px; }
</style>
</head>
<body>
  <div class="label">Display — Playfair Display</div>
  <div class="divider"></div>

  <div style="margin-bottom:20px">
    <div class="display-1">Royal Millennium</div>
    <div class="meta">Playfair Display · 64px · 800 · uppercase · tracking 0.08em</div>
  </div>

  <div style="margin-bottom:20px">
    <div class="display-2">Redefined Royality</div>
    <div class="meta">Playfair Display · 40px · 700 · normal case</div>
  </div>

  <div style="margin-bottom:20px">
    <div class="display-3">Connect. Create. Succeed.</div>
    <div class="meta">Playfair Display · 28px · 600 · gold accent</div>
  </div>
</body>
</html>
