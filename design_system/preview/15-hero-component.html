<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hero Component — Royal Millennium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #f5f0e8; }

  .hero {
    position: relative;
    background: #3a3530;
    min-height: 340px;
    display: flex; align-items: flex-end;
    overflow: hidden;
  }
  .hero-img-placeholder {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #4a3f38 0%, #3a3530 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .hero-img-placeholder-label {
    font-size: 11px; font-family: monospace; color: #5c5148;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(90,80,72,0.15) 10px, rgba(90,80,72,0.15) 20px);
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(30,26,23,0.92) 0%, rgba(30,26,23,0.3) 60%, transparent 100%);
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 40px 40px 36px;
    width: 100%;
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #c9a84c; margin-bottom: 10px;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 52px; font-weight: 800;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #ffffff; line-height: 1.0;
    margin-bottom: 10px;
  }
  .hero-subtitle {
    font-size: 16px; font-weight: 400;
    color: rgba(255,255,255,0.75); margin-bottom: 20px;
    line-height: 1.5; max-width: 480px;
  }
  .hero-actions { display: flex; gap: 12px; align-items: center; }
  .btn-hero-primary {
    padding: 13px 28px; background: #c9a84c; color: #1e1a17;
    border: none; border-radius: 7px;
    font-family: 'Montserrat', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  }
  .btn-hero-ghost {
    padding: 13px 28px; background: transparent; color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4); border-radius: 7px;
    font-family: 'Montserrat', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  }
  .hero-location {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 14px;
  }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #9e8668; padding: 12px 16px 6px; background: #f5f0e8; }
</style>
</head>
<body>
  <div class="section-label">Hero Section</div>
  <div class="hero">
    <div class="hero-img-placeholder">
      <div class="hero-img-placeholder-label">
        <span style="background:rgba(30,26,23,0.5);padding:6px 12px;border-radius:4px;color:#c8b89a;font-size:11px">[ Building Render — Full Bleed Hero Image ]</span>
      </div>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">Redefined Royality · Gandhidham</div>
      <div class="hero-title">Royal<br>Millennium</div>
      <div class="hero-subtitle">Premium Retail Showrooms, Executive Shops, Spacious Offices &amp; Work Units</div>
      <div class="hero-actions">
        <button class="btn-hero-primary">Book a Site Visit</button>
        <button class="btn-hero-ghost">Download Brochure</button>
      </div>
      <div class="hero-location">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Airport Road, Gateway of Kandla Airport · Opposite Lake City
      </div>
    </div>
  </div>
</body>
</html>
