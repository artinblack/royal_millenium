<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Colors — Royal Millennium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #f5f0e8; padding: 24px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .swatch { flex: 1; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 72px; }
  .swatch-info { padding: 8px 10px; background: #fff; }
  .swatch-name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #2a2420; }
  .swatch-hex { font-size: 11px; color: #7a6e68; margin-top: 2px; font-family: monospace; }
  .swatch-role { font-size: 10px; color: #9e8668; margin-top: 2px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #9e8668; margin-bottom: 8px; }
</style>
</head>
<body>
  <div style="margin-bottom:12px">
    <div class="section-label">Primary Palette</div>
    <div class="row">
      <div class="swatch">
        <div class="swatch-color" style="background:#c9a84c"></div>
        <div class="swatch-info">
          <div class="swatch-name">Gold</div>
          <div class="swatch-hex">#c9a84c</div>
          <div class="swatch-role">Primary Accent</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#3a3530"></div>
        <div class="swatch-info">
          <div class="swatch-name">Charcoal</div>
          <div class="swatch-hex">#3a3530</div>
          <div class="swatch-role">Primary Dark BG</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#c8b89a"></div>
        <div class="swatch-info">
          <div class="swatch-name">Sand Taupe</div>
          <div class="swatch-hex">#c8b89a</div>
          <div class="swatch-role">Warm Secondary</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#f5f0e8; border: 1px solid #ddd0be;"></div>
        <div class="swatch-info">
          <div class="swatch-name">Off-White</div>
          <div class="swatch-hex">#f5f0e8</div>
          <div class="swatch-role">Light Surface</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#2a2420"></div>
        <div class="swatch-info">
          <div class="swatch-name">Near Black</div>
          <div class="swatch-hex">#2a2420</div>
          <div class="swatch-role">Dark Text</div>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-label">Gold Scale</div>
    <div class="row">
      <div class="swatch">
        <div class="swatch-color" style="background:#f8f0d8; border:1px solid #ddd0be"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 100</div><div class="swatch-hex">#f8f0d8</div></div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#edd99e"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 200</div><div class="swatch-hex">#edd99e</div></div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#d9be6e"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 300</div><div class="swatch-hex">#d9be6e</div></div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#c9a84c"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 400 ★</div><div class="swatch-hex">#c9a84c</div></div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#b08c30"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 500</div><div class="swatch-hex">#b08c30</div></div>
      </div>
      <div class="swatch">
        <div class="swatch-color" style="background:#8c6e20"></div>
        <div class="swatch-info"><div class="swatch-name">Gold 600</div><div class="swatch-hex">#8c6e20</div></div>
      </div>
    </div>
  </div>
</body>
</html>
