<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neutral Colors — Royal Millennium</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #f5f0e8; padding: 24px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .swatch { flex: 1; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 64px; }
  .swatch-info { padding: 8px 10px; background: #fff; }
  .swatch-name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #2a2420; }
  .swatch-hex { font-size: 11px; color: #7a6e68; margin-top: 2px; font-family: monospace; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #9e8668; margin-bottom: 8px; }
</style>
</head>
<body>
  <div style="margin-bottom:12px">
    <div class="section-label">Charcoal Scale</div>
    <div class="row">
      <div class="swatch"><div class="swatch-color" style="background:#7a6e68"></div><div class="swatch-info"><div class="swatch-name">Ch 100</div><div class="swatch-hex">#7a6e68</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#5c5148"></div><div class="swatch-info"><div class="swatch-name">Ch 200</div><div class="swatch-hex">#5c5148</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#4a3f38"></div><div class="swatch-info"><div class="swatch-name">Ch 300</div><div class="swatch-hex">#4a3f38</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#3a3530"></div><div class="swatch-info"><div class="swatch-name">Ch 400 ★</div><div class="swatch-hex">#3a3530</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#2a2420"></div><div class="swatch-info"><div class="swatch-name">Ch 500</div><div class="swatch-hex">#2a2420</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#1e1a17"></div><div class="swatch-info"><div class="swatch-name">Ch 600</div><div class="swatch-hex">#1e1a17</div></div></div>
    </div>
  </div>
  <div>
    <div class="section-label">Sand Scale</div>
    <div class="row">
      <div class="swatch"><div class="swatch-color" style="background:#f5f0e8; border:1px solid #ddd0be"></div><div class="swatch-info"><div class="swatch-name">Sand 100</div><div class="swatch-hex">#f5f0e8</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#ede4d6"></div><div class="swatch-info"><div class="swatch-name">Sand 200</div><div class="swatch-hex">#ede4d6</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#ddd0be"></div><div class="swatch-info"><div class="swatch-name">Sand 300</div><div class="swatch-hex">#ddd0be</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#c8b89a"></div><div class="swatch-info"><div class="swatch-name">Sand 400 ★</div><div class="swatch-hex">#c8b89a</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#b8a082"></div><div class="swatch-info"><div class="swatch-name">Sand 500</div><div class="swatch-hex">#b8a082</div></div></div>
      <div class="swatch"><div class="swatch-color" style="background:#9e8668"></div><div class="swatch-info"><div class="swatch-name">Sand 600</div><div class="swatch-hex">#9e8668</div></div></div>
    </div>
  </div>
</body>
</html>
